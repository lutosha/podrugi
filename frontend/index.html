<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podrugi — соцсеть для девушек Лондона</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="assets/logo.svg" alt="Podrugi" class="logo" />
    <nav id="guestNav">
      <button id="loginBtn" class="btn btn-secondary">Войти</button>
      <button id="registerBtn" class="btn btn-primary">Регистрация</button>
    </nav>
    <nav id="userNav" class="hidden">
      <span id="userGreeting"></span>
      <button id="logoutBtn" class="btn btn-secondary">Выйти</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Найди своих в Лондоне</h1>
      <p>Сообщество для девушек — знакомства по районам, встречи и поддержка.</p>
    </section>

    <section id="feed" class="feed">
      <h2 id="feedTitle">Лента</h2>
      <form id="postForm" class="post-form hidden">
        <textarea id="postContent" placeholder="Что у тебя нового?" required maxlength="2000"></textarea>
        <input type="text" id="postArea" placeholder="Район (необязательно)" maxlength="100" />
        <button type="submit" class="btn btn-primary">Опубликовать</button>
        <p id="postMessage"></p>
      </form>
      <div id="postsList"></div>
      <p id="feedHint" class="feed-hint hidden">Войди или зарегистрируйся, чтобы увидеть больше и написать самой.</p>
    </section>
  </main>

  <div id="authModal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="modal-close">&times;</button>
      <h2 id="modalTitle">Вход</h2>
      <form id="authForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="password" id="password" placeholder="Пароль" required />
        <input type="text" id="name" placeholder="Имя" class="hidden" />
        <label id="ageLabel" class="age-label hidden">
          <input type="checkbox" id="ageConfirmed" />
          Мне есть 18 лет
        </label>
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
      <p id="authMessage"></p>
    </div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2026 Podrugi. podrugi.co.uk</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
