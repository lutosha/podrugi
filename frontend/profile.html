<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — Podrugi</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="assets/logo.svg" alt="Podrugi" class="logo" />
  </header>

  <main class="feed" style="max-width: 600px;">
    <div id="profileHeader"></div>
    <p id="profileMessage"></p>

    <form id="editProfileForm" class="post-form hidden">
      <div class="avatar-upload">
        <div id="avatarPreview" class="post-avatar"></div>
        <input type="file" id="editAvatar" accept="image/*" />
      </div>
      <input type="text" id="editName" placeholder="Имя" maxlength="100" required />
      <select id="editBorough" required>
        <option value="" disabled>Выбери район</option>
      </select>
      <textarea id="editBio" placeholder="О себе (необязательно)" maxlength="300"></textarea>
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>

    <div id="ownActions" class="post-actions hidden"></div>
    <div id="profileActions" class="post-actions"></div>

    <h2 style="margin: 1.5rem 0 1rem;">Посты</h2>
    <div id="profilePosts"></div>
  </main>

  <nav id="bottomNav" class="bottom-nav hidden">
    <a href="index.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">🏠</span><span>Лента</span>
    </a>
    <a href="friends.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">👭</span><span>Подруги</span>
    </a>
    <a href="index.html?compose=1" class="bottom-nav-item bottom-nav-compose">
      <span class="bottom-nav-icon">✚</span><span>Написать</span>
    </a>
    <a href="messages.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">💬</span><span>Сообщения</span>
    </a>
    <a id="bottomProfileLink" href="profile.html" class="bottom-nav-item active">
      <span id="bottomProfileAvatar" class="bottom-nav-avatar">👤</span><span>Профиль</span>
    </a>
  </nav>

  <script src="profile.js"></script>
</body>
</html>
