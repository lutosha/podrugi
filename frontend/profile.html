<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — Podrugi</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <img src="assets/logo.svg" alt="Podrugi" class="logo" />
    <a href="index.html" class="btn btn-secondary">На главную</a>
  </header>

  <main class="feed" style="max-width: 600px;">
    <div id="profileHeader"></div>
    <p id="profileMessage"></p>

    <form id="editProfileForm" class="post-form hidden">
      <input type="text" id="editName" placeholder="Имя" maxlength="100" required />
      <input type="text" id="editCity" placeholder="Район (необязательно)" maxlength="100" />
      <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>

    <div id="profileActions" class="post-actions"></div>

    <h2 style="margin: 1.5rem 0 1rem;">Посты</h2>
    <div id="profilePosts"></div>
  </main>

  <script src="profile.js"></script>
</body>
</html>
